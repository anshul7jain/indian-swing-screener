name: Morning Telegram Signals

on:
  schedule:
    # 02:30 UTC is 08:00 IST. Weekdays only.
    - cron: "30 2 * * 1-5"
    # Fallback for observed GitHub schedule drift: 22:30 UTC + ~4h delay ~= 08:00 IST.
    - cron: "30 22 * * 0-4"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram paper signals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          SCREENER_MIN_SCORE: ${{ vars.SCREENER_MIN_SCORE || '65' }}
          SCREENER_MAX_SYMBOLS: ${{ vars.SCREENER_MAX_SYMBOLS || '' }}
          NOTIFY_DRY_RUN: "false"
          REQUIRE_TELEGRAM_CONFIG: "true"
          ENFORCE_SEND_WINDOW: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: python -m src.notify_telegram
